<!--
  Drip Fantasy — email signature
  Paste into Gmail → Settings → See all settings → General → Signature → "Create new".
  (Gmail strips <style> blocks and web fonts, so everything here is inline + Arial-safe.)

  Fill in the three tokens before pasting:
    [Your Name]  → your name
    [Title]      → your role (default: Founder)
    [Phone]      → optional; delete the whole phone <span> below if you don't want it.

  ICON: the ◆ mark below is text (renders everywhere). To use hosted art instead,
  replace the mark cell's <span> with <img src="https://www.dripfantasy.com/icons/mark.png" width="40" height="40" alt="Drip Fantasy">.
-->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;font-family:Arial,Helvetica,sans-serif;">
  <tr>
    <!-- Brand mark -->
    <td style="vertical-align:top;padding:2px 18px 0 0;">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
        <tr><td style="background:#142A2E;border-radius:10px;width:44px;height:44px;text-align:center;vertical-align:middle;">
          <span style="color:#34E5D9;font-size:22px;line-height:44px;">&#9670;</span>
        </td></tr>
      </table>
    </td>
    <!-- Divider -->
    <td style="border-left:2px solid #34E5D9;padding:0 0 0 18px;vertical-align:top;">
      <div style="font-size:16px;font-weight:700;color:#142A2E;line-height:1.3;">[Your Name]</div>
      <div style="font-size:13px;color:#0E8C7A;font-weight:700;letter-spacing:.3px;line-height:1.5;">[Title] &middot; Drip Fantasy</div>
      <div style="font-size:12px;color:#6b6a63;line-height:1.5;padding-top:2px;">Real-time fantasy football &mdash; hidden picks, live effects.</div>
      <div style="font-size:12px;color:#6b6a63;line-height:1.7;padding-top:8px;">
        <a href="https://www.dripfantasy.com" style="color:#0E8C7A;text-decoration:none;font-weight:700;">dripfantasy.com</a>
        <span style="color:#c9c7bf;padding:0 6px;">&middot;</span>
        <a href="mailto:hi@dripfantasy.com" style="color:#0E8C7A;text-decoration:none;">hi@dripfantasy.com</a>
        <span style="color:#c9c7bf;padding:0 6px;">&middot;</span>
        <span style="color:#6b6a63;">[Phone]</span>
      </div>
    </td>
  </tr>
</table>
