name: Deploy Edge Functions

# Manually deploy the league-import Edge Functions to Supabase. The access token
# stays in GitHub secrets — it never leaves CI. Run from the Actions tab → this
# workflow → "Run workflow", choosing the branch that has the function code and
# entering your project ref.
#
# Functions:
#   espn-league   — ESPN v3 proxy (cookies for private leagues). No secrets.
#   fantasy-proxy — Fleaflicker + MFL GET proxy. No secrets.
#   yahoo-oauth   — Yahoo OAuth/token/proxy. Needs YAHOO_CLIENT_ID/SECRET secrets
#                   AND an approved Yahoo Fantasy app to actually return data.
#   send-invite   — Admin-only invite emailer (Gmail API). Deployed WITH JWT
#                   verification (only signed-in admins call it). Reads its own
#                   secrets (GOOGLE_SA_EMAIL / GOOGLE_SA_PRIVATE_KEY / GMAIL_SENDER
#                   / GMAIL_FROM_NAME) — set those in the Supabase dashboard
#                   (Edge Functions → Secrets), so the Google key never touches CI.
#
# The demo proxies deploy with --no-verify-jwt so anonymous visitors can invoke
# them; send-invite keeps JWT verification on. See the per-function logic below.
#
# Requires repo secret: SUPABASE_ACCESS_TOKEN (Supabase → Account → Access Tokens).
on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: 'Supabase project ref (app.supabase.com/project/<ref>)'
        required: true
      functions:
        description: 'Which to deploy'
        required: true
        default: 'espn-league fantasy-proxy'
        type: choice
        options:
          - 'espn-league fantasy-proxy'
          - 'espn-league fantasy-proxy yahoo-oauth'
          - 'espn-league'
          - 'fantasy-proxy'
          - 'yahoo-oauth'
          - 'send-invite'

concurrency: supabase-functions-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Set the SUPABASE_ACCESS_TOKEN repo secret (Supabase → Account → Access Tokens)."; exit 1
          fi
          for fn in ${{ github.event.inputs.functions }}; do
            echo "── deploying $fn ──"
            # send-invite is admin-only → keep JWT verification on; the demo
            # proxies stay anonymous (--no-verify-jwt).
            if [ "$fn" = "send-invite" ]; then
              supabase functions deploy "$fn" --project-ref "${{ github.event.inputs.project_ref }}"
            else
              supabase functions deploy "$fn" --project-ref "${{ github.event.inputs.project_ref }}" --no-verify-jwt
            fi
          done
          echo "done."
