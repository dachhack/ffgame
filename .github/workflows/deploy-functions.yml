name: Deploy Edge Functions

# Manually deploy the league-import Edge Functions to Supabase. The access token
# stays in GitHub secrets — it never leaves CI. Run from the Actions tab → this
# workflow → "Run workflow", choosing the branch that has the function code and
# entering your project ref.
#
# Functions:
#   espn-league   — ESPN v3 proxy (cookies for private leagues). No secrets.
#   fantasy-proxy — Fleaflicker + MFL GET proxy. No secrets.
#   yahoo-oauth   — Yahoo OAuth/token/proxy. Needs YAHOO_CLIENT_ID/SECRET secrets
#                   AND an approved Yahoo Fantasy app to actually return data.
#
# All deploy with --no-verify-jwt so anonymous demo visitors can invoke them.
#
# Requires repo secret: SUPABASE_ACCESS_TOKEN (Supabase → Account → Access Tokens).
on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: 'Supabase project ref (app.supabase.com/project/<ref>)'
        required: true
      functions:
        description: 'Which to deploy'
        required: true
        default: 'espn-league fantasy-proxy'
        type: choice
        options:
          - 'espn-league fantasy-proxy'
          - 'espn-league fantasy-proxy yahoo-oauth'
          - 'espn-league'
          - 'fantasy-proxy'
          - 'yahoo-oauth'

concurrency: supabase-functions-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Set the SUPABASE_ACCESS_TOKEN repo secret (Supabase → Account → Access Tokens)."; exit 1
          fi
          for fn in ${{ github.event.inputs.functions }}; do
            echo "── deploying $fn ──"
            supabase functions deploy "$fn" \
              --project-ref "${{ github.event.inputs.project_ref }}" \
              --no-verify-jwt
          done
          echo "done."
