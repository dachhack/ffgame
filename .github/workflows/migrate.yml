name: Apply Supabase migrations

# Runs newly-ADDED files in supabase/migrations/ against the database whenever
# they land on main (i.e. on every merged PR that adds a migration). No SQL
# pasting. Only added files run (existing, already-applied migrations are never
# re-run), so it needs no migration tracking.
on:
  push:
    # claude/demo-copy-scoring-bug-wbvdu0 is TEMPORARY (dispatch token lacks
    # actions:write; apply rides the push trigger). Revert to [main] at merge.
    branches: [main, claude/demo-copy-scoring-bug-wbvdu0]
    paths: ['supabase/migrations/**']
  workflow_dispatch:
    inputs:
      file:
        description: 'Optional: a specific migration file to (re)run, e.g. supabase/migrations/0006_x.sql'
        required: false

concurrency: supabase-migrate  # never run two at once

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # full history so the push's "before" SHA is present
      - name: Ensure psql
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)
      - name: Apply migrations
        env:
          PGURL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${PGURL:-}" ]; then echo "::error::Set the SUPABASE_DB_URL repo secret (Settings → Secrets → Actions)."; exit 1; fi
          if [ -n "${{ github.event.inputs.file }}" ]; then
            files="${{ github.event.inputs.file }}"
          else
            files=$(git diff --no-renames --name-only --diff-filter=A "${{ github.event.before }}" "${{ github.sha }}" -- 'supabase/migrations/*.sql' | sort)
          fi
          if [ -z "$files" ]; then echo "No new migration files to apply."; exit 0; fi
          for f in $files; do
            echo "── applying $f ──"
            psql "$PGURL" -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "done."
