name: Deploy to GitHub Pages

on:
  push:
    # `main` is the active integration branch and is allowed to publish (added
    # to the github-pages environment's deployment branches), so merges to main
    # deploy automatically.
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Site is served from dripfantasy.com root, not /ffgame/.
          VITE_BASE: /
          # PostHog project token (phc_…, public/write-only). Set as a repo Variable:
          # Settings → Secrets and variables → Actions → Variables → VITE_POSTHOG_KEY.
          # Unset → analytics is a no-op (posthog-js isn't even loaded).
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
